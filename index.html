<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KUET Business and Entrepreneurship Club</title>
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body>
    <header class="hero" id="top">
      <video class="hero-video" autoplay muted loop playsinline>
        <source src="assets/full_event.mp4" type="video/mp4" />
      </video>
      <div class="hero-overlay"></div>

      <nav class="hero-topbar" aria-label="Primary">
        <img
          class="club-logo"
          src="https://www.kbec-official.org/assets/kbeclogoDarkBG-BXKv6nqZ.svg"
          alt="KUET Business and Entrepreneurship Club"
          width="360"
          height="80"
        />
        <div class="hero-actions">
          <button
            class="sound-toggle"
            type="button"
            aria-label="Turn sound on"
            aria-pressed="false"
            data-state="muted"
          >
            <span class="sound-bars" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </span>
          </button>
          <button
            class="menu-button"
            type="button"
            aria-expanded="false"
            aria-controls="site-menu"
          >
            <span class="menu-label">Menu</span>
            <span class="menu-dots" aria-hidden="true">
              <span></span>
              <span></span>
            </span>
          </button>
        </div>
      </nav>

      <div class="site-menu" id="site-menu" aria-hidden="true">
        <a href="#top">Home</a>
        <a href="#about">About Us</a>
        <a href="#events">Events</a>
        <a href="#sponsors">Sponsors</a>
        <a href="#hall-of-fame">Hall of Fame</a>
        <a href="#partners">Club Partners</a>
        <a href="#alumni">Alumni</a>
        <a href="#executive-panel">Executive Panel</a>
        <a href="#faculty-advisors">Faculty Advisors</a>
      </div>

      <div class="hero-content">
        <h1 class="hero-title">
          <span class="title-line">KUET BUSINESS</span>
          <span class="title-line title-line-combo">
            <span class="title-group">
              <span class="title-part">&amp;</span>
              <span class="title-part">ENTREPRENEURSHIP</span>
            </span>
            <span class="title-part">CLUB</span>
          </span>
        </h1>
        <p class="tag">
          The Premier Business and Entrepreneurship Club at KUET
        </p>
      </div>
    </header>

    <section class="modal" id="register-modal" aria-label="Registration form">
      <a href="#top" class="modal-backdrop" aria-label="Close"></a>
      <div class="modal-card">
        <div class="modal-head">
          <h2>Register Now</h2>
          <a class="close-modal" href="#top" aria-label="Close">&times;</a>
        </div>

        <form action="#" method="post" class="form">
          <label for="fullname">Full Name</label>
          <input type="text" id="fullname" name="fullname" required />

          <fieldset class="radio-group">
            <legend>Gender</legend>
            <div class="radio-row">
              <label class="radio-option" for="gender-male">
                <input
                  type="radio"
                  id="gender-male"
                  name="gender"
                  value="male"
                  required
                />
                Male
              </label>
              <label class="radio-option" for="gender-female">
                <input
                  type="radio"
                  id="gender-female"
                  name="gender"
                  value="female"
                />
                Female
              </label>
              <label class="radio-option" for="gender-other">
                <input
                  type="radio"
                  id="gender-other"
                  name="gender"
                  value="other"
                />
                Other
              </label>
            </div>
          </fieldset>

          <label for="department">Department</label>
          <select id="department" name="department" required>
            <option value="" selected disabled>Select department</option>
            <option value="cse">CSE</option>
            <option value="ece">ECE</option>
            <option value="me">ME</option>
            <option value="civil">Civil</option>
            <option value="arch">Architecture</option>
          </select>

          <label for="roll">Roll</label>
          <input type="text" id="roll" name="roll" required />

          <label for="session">Session Info</label>
          <input
            type="text"
            id="session"
            name="session"
            placeholder="e.g. 2023-24"
            required
          />

          <label for="remarks">Remarks</label>
          <textarea id="remarks" name="remarks" rows="3"></textarea>

          <button type="submit">Submit Registration</button>
        </form>
      </div>
    </section>
    <script src="js/main.js"></script>
  </body>
</html>
